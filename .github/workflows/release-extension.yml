name: Publish Sly Fox Translator beta

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the tagged source
        uses: actions/checkout@v4

      - name: Verify the tag matches the extension version
        run: |
          version="$(node -p \"require('./extension/manifest.json').version\")"
          expected_tag="v${version}"

          if [ "$GITHUB_REF_NAME" != "$expected_tag" ]; then
            echo "Tag $GITHUB_REF_NAME does not match extension version $version."
            exit 1
          fi

      - name: Package the extension
        id: package
        run: |
          archive="sly-fox-translator-${GITHUB_REF_NAME}-unpacked.zip"
          mkdir -p release
          (
            cd extension
            zip -r "../release/$archive" . -x "*.DS_Store"
          )
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "release/${{ steps.package.outputs.archive }}#Sly Fox Translator beta ZIP" \
            --title "Sly Fox Translator $GITHUB_REF_NAME" \
            --notes-file .github/release-notes.md
