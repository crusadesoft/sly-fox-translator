<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sly Fox Translator</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div class="brand">
          <img class="brand-logo" src="icons/logo-192.png" alt="" aria-hidden="true">
          <div>
            <h1>Sly Fox Translator</h1>
            <p id="entry-count">0 replacing / 0 total</p>
          </div>
        </div>
        <div class="header-actions">
          <button
            id="runtime-retry"
            class="icon-button secondary runtime-retry"
            type="button"
            aria-label="Retry current page"
            title="Retry current page"
          >
            <span class="lucide-icon lucide-icon-rotate-ccw" data-lucide-icon="rotate-ccw" aria-hidden="true"></span>
          </button>
        </div>
      </header>

      <section class="profile-bar" aria-label="Vocabulary language">
        <div class="language-field">
          <span id="language-label" class="field-label">Language</span>
          <div class="language-controls">
            <div id="language-picker" class="language-picker">
              <button
                id="language-trigger"
                class="language-trigger"
                type="button"
                aria-haspopup="listbox"
                aria-expanded="false"
                aria-controls="language-options"
                aria-labelledby="language-label language-trigger-label"
              >
                <span class="language-current">
                  <img id="language-trigger-icon" class="language-icon" src="icons/languages/flags/va.svg" alt="" aria-hidden="true">
                  <span id="language-trigger-label">Language</span>
                </span>
                <svg class="language-chevron" aria-hidden="true" viewBox="0 0 24 24">
                  <path d="m6 9 6 6 6-6"></path>
                </svg>
              </button>
              <div id="language-options" class="language-options hidden" role="listbox" aria-labelledby="language-label"></div>
              <select id="profile-select" class="native-language-select" tabindex="-1" aria-hidden="true"></select>
            </div>
            <button
              id="settings-view-tab"
              class="icon-button secondary settings-button"
              type="button"
              aria-pressed="false"
              aria-label="Settings"
              title="Settings"
            >
              <span class="lucide-icon lucide-icon-settings" data-lucide-icon="settings" aria-hidden="true"></span>
            </button>
            <button
              id="panic-toggle"
              class="icon-button secondary settings-button panic-button"
              type="button"
              aria-pressed="false"
              aria-label="Turn replacements off"
              title="Turn replacements off"
            >
              <span class="lucide-icon lucide-icon-power" data-lucide-icon="power" aria-hidden="true"></span>
            </button>
          </div>
        </div>
      </section>

      <section id="vocabulary-view" class="app-view">

      <section class="duolingo-panel" aria-label="Duolingo vocabulary">
        <button id="open-duolingo-words" class="secondary duolingo-sync" type="button"
          title="Open Duolingo's Words page — import, browse, and manage your synced words there">
          <img class="duolingo-tab-bird" src="icons/duolingo-bird.png" alt="" aria-hidden="true">
          <span>Manage words on Duolingo</span>
        </button>
      </section>




        <section id="page-status-panel" class="page-runtime" aria-label="Current page replacement status">
          <div>
            <strong id="runtime-title">Current page</strong>
            <p id="runtime-status">Checking this tab...</p>
          </div>
        </section>
      <section id="do-not-translate-panel" class="bulk do-not-translate" aria-label="Do not translate">
        <div id="do-not-translate-actions" class="do-not-translate-actions hidden">
          <button id="exclude-page" class="secondary page-exclusion-button" type="button">
            <svg class="command-icon" aria-hidden="true" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="9"></circle>
              <path d="m5.6 5.6 12.8 12.8"></path>
            </svg>
            <span id="exclude-page-label">Don't translate this page</span>
          </button>
          <button id="exclude-site" class="secondary page-exclusion-button" type="button">
            <svg class="command-icon" aria-hidden="true" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="9"></circle>
              <path d="M3 12h18"></path>
              <path d="M12 3a14 14 0 0 1 0 18"></path>
              <path d="M12 3a14 14 0 0 0 0 18"></path>
            </svg>
            <span id="exclude-site-label">Don't translate this site</span>
          </button>
        </div>
      </section>
      </section>

    </main>
    <script src="import-core.js"></script>
    <script src="dictionaries.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
